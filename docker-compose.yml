services:
  mysql:
    image: mysql:8.0
    container_name: paperpilot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: paperpilot
      MYSQL_USER: paperpilot
      MYSQL_PASSWORD: paperpilot
    ports:
      - "3306:3306"
    volumes:
      - paperpilot_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  paperpilot_mysql_data:
